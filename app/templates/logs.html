{% extends "layout.html" %}
{% block content %}

<div class="card mt">
  <div class="card-title">Son Gönderimler / Hatalar</div>
<div class="row mt" style="display:flex; gap:10px; align-items:center; justify-content:space-between;">
  <div class="muted small">Kayıt sayısı: {{ recent|length }}</div>

  <button class="btn btn-bad" type="button"
    onclick="clearLogs()">
    Log Temizle
  </button>
</div>

<script>
async function clearLogs(){
  if(!confirm("Tüm log kayıtları silinsin mi? Bu işlem geri alınamaz.")) return;
  const r = await fetch("/logs/clear", { method: "POST" });
  if(!r.ok){
    const t = await r.text();
    alert("Silme başarısız: " + t);
    return;
  }
  location.reload();
}
</script>

  <div class="table table-compact mt">
    <div class="tr th" style="grid-template-columns: 70px 1.20fr 130px 200px 2.2fr;">
      <div>No</div><div>Firma</div><div>Durum</div><div>Son</div><div>Hata</div>
    </div>

    {% for it in recent %}
    <div class="tr" style="grid-template-columns: 70px 1.1fr 110px 200px 2.2fr; align-items:center;">
      <div class="muted">#{{ it.id }}</div>
      <div>{{ it.name }}</div>
      <div>
        <span class="badge {% if it.status in ['SENT','DONE'] %}badge-ok{% elif it.status in ['ERROR','PAUSED_LIMIT'] %}badge-bad{% else %}badge-muted{% endif %}">
          {{ it.status_tr }}
        </span>
      </div>
      <div class="muted">{{ it.last_at }}</div>
      <div class="muted small" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="{{ it.err }}">{{ it.err }}</div>
    </div>
    {% endfor %}
  </div>
</div>

{% endblock %}
